<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <!-- Background -->
  <rect width="900" height="280" fill="#1a1a2e" rx="12"/>
  <rect width="900" height="280" fill="#16213e" rx="12" opacity="0.6"/>

