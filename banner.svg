  <polygon points="164,136 172,140 164,144" fill="#ffffff" opacity="0.4"/>

  <!-- Top separated waveform (pink) - Speaker A -->
  <rect x="184" y="98" width="3" height="24" rx="1.5" fill="#f857a6" opacity="0.9"/>
  <rect x="191" y="90" width="3" height="40" rx="1.5" fill="#ff5858" opacity="0.9"/>
  <rect x="198" y="102" width="3" height="16" rx="1.5" fill="#f857a6" opacity="0.9"/>
  <rect x="205" y="85" width="3" height="50" rx="1.5" fill="#ff5858" opacity="0.9"/>
  <rect x="212" y="95" width="3" height="30" rx="1.5" fill="#f857a6" opacity="0.9"/>

  <!-- Bottom separated waveform (green) - Speaker B -->
  <rect x="184" y="155" width="3" height="30" rx="1.5" fill="#43e97b" opacity="0.9"/>
  <rect x="191" y="160" width="3" height="20" rx="1.5" fill="#38f9d7" opacity="0.9"/>
  <rect x="198" y="148" width="3" height="44" rx="1.5" fill="#43e97b" opacity="0.9"/>
  <rect x="205" y="162" width="3" height="16" rx="1.5" fill="#38f9d7" opacity="0.9"/>
  <rect x="212" y="152" width="3" height="36" rx="1.5" fill="#43e97b" opacity="0.9"/>

  <!-- Microphone icon -->
  <rect x="248" y="108" width="16" height="28" rx="8" fill="none" stroke="#00d2ff" stroke-width="2"/>
  <path d="M244,130 Q244,146 256,146 Q268,146 268,130" fill="none" stroke="#00d2ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="256" y1="146" x2="256" y2="154" stroke="#00d2ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="250" y1="154" x2="262" y2="154" stroke="#00d2ff" stroke-width="2" stroke-linecap="round"/>
  <path d="M272,116 Q278,122 272,130" fill="none" stroke="#7b2ff7" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M276,112 Q284,122 276,134" fill="none" stroke="#7b2ff7" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Title -->
  <text x="300" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#c084fc">Voice Sampler</text>
  <text x="300" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="300" fill="#a0a0c0" letter-spacing="3">FOR TTS</text>

  <!-- Subtitle -->
  <text x="300" y="200" font-family="monospace" font-size="13" fill="#6a6a8a">
