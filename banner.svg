  <rect x="740" y="115" width="4" height="50" rx="2" fill="#ff5858" opacity="0.12"/>
  <rect x="750" y="102" width="4" height="76" rx="2" fill="#43e97b" opacity="0.12"/>
  <rect x="760" y="128" width="4" height="24" rx="2" fill="#38f9d7" opacity="0.12"/>
  <rect x="770" y="110" width="4" height="60" rx="2" fill="#00d2ff" opacity="0.12"/>
  <rect x="780" y="90" width="4" height="100" rx="2" fill="#7b2ff7" opacity="0.12"/>
  <rect x="790" y="120" width="4" height="40" rx="2" fill="#b465da" opacity="0.12"/>
  <rect x="800" y="100" width="4" height="80" rx="2" fill="#f857a6" opacity="0.12"/>
  <rect x="810" y="122" width="4" height="36" rx="2" fill="#ff5858" opacity="0.12"/>
  <rect x="820" y="108" width="4" height="64" rx="2" fill="#43e97b" opacity="0.12"/>
  <rect x="830" y="130" width="4" height="20" rx="2" fill="#38f9d7" opacity="0.12"/>
  <rect x="840" y="98" width="4" height="84" rx="2" fill="#00d2ff" opacity="0.12"/>
  <rect x="850" y="118" width="4" height="44" rx="2" fill="#7b2ff7" opacity="0.12"/>

