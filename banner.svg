  <line x1="0" y1="140" x2="900" y2="140" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="210" x2="900" y2="210" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>

  <!-- Left waveform - mixed audio (cyan) -->
  <rect x="50" y="112" width="4" height="56" rx="2" fill="#00d2ff" opacity="0.85"/>
  <rect x="58" y="98" width="4" height="84" rx="2" fill="#00bcd4" opacity="0.85"/>
  <rect x="66" y="122" width="4" height="36" rx="2" fill="#00d2ff" opacity="0.85"/>
