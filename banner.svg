  <text x="339" y="235" font-family="monospace" font-size="10" fill="#00d2ff" text-anchor="middle">SAM Audio</text>

  <rect x="388" y="220" width="68" height="22" rx="4" fill="#1e1e3a" stroke="#3a3a5c" stroke-width="1"/>
  <text x="422" y="235" font-family="monospace" font-size="10" fill="#f857a6" text-anchor="middle">pyannote</text>

  <rect x="466" y="220" width="72" height="22" rx="4" fill="#1e1e3a" stroke="#3a3a5c" stroke-width="1"/>
  <text x="502" y="235" font-family="monospace" font-size="10" fill="#43e97b" text-anchor="middle">Chatterbox</text>

  <rect x="548" y="220" width="60" height="22" rx="4" fill="#1e1e3a" stroke="#3a3a5c" stroke-width="1"/>
  <text x="578" y="235" font-family="monospace" font-size="10" fill="#ffb347" text-anchor="middle">Audacity</text>
</svg>
